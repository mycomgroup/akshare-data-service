      models. The aim of this line of research is to make financial markets more transparent
      by exposing how volatility changes through time.


      This Library is used as the basis of some of our own research, which effects
      its scope, and is made available here to encourage the more widespread exploitation
      of these methods. It is given ''as is'' and solely for informational purposes,
      please read the disclaimer.


      The volatility data can be visually explored. We make the complete up-to-date
      dataset available for download. Lists of assets covered and realized measures
      available are also available.'
    domains:
    - realized.oxford-man.ox.ac.uk
    name: article_oman_rv_short
    output_fields: []
    probe:
      check_interval: 2592000
      params:
        symbol: 'str FTSE: FTSE 100, GDAXI: DAX, RUT: Russel 2000, SPX: S&P 500 Index,
          STOXX50E: EURO STOXX 50, SSEC: Shanghai Composite Index, N225: Nikkei 225'
      skip: false
    rate_limit_key: default
    signature:
    - symbol
    sources: []
  article_rlab_rv:
    category: other
    description: "修大成主页-Risk Lab-Realized Volatility\n:param symbol: str 股票代码\n:return:\
      \ pandas.DataFrame\n1996-01-02    0.000000\n1996-01-04    0.000000\n1996-01-05\
      \    0.000000\n1996-01-09    0.000000\n1996-01-10    0.000000\n            \
      \    ...\n2019-11-04    0.175107\n2019-11-05    0.185112\n2019-11-06    0.210373\n\
      2019-11-07    0.240808\n2019-11-08    0.199549\nName: RV, Length: 5810, dtype:\
      \ float64\n\nWebsite\nhttps://dachxiu.chicagobooth.edu/\n\nObjective\nWe provide\
      \ up-to-date daily annualized realized volatilities for individual stocks, ETFs,\
      \ and future contracts, which are estimated from high-frequency data. We are\
      \ in the process of incorporating equities from global markets.\n\nData\nWe\
      \ collect trades at their highest frequencies available (up to every millisecond\
      \ for US equities after 2007), and clean them using the prevalent national best\
      \ bid and offer (NBBO) that are available up to every second. The mid-quotes\
      \ are calculated based on the NBBOs, so their highest sampling frequencies are\
      \ also up to every second.\n\nMethodology\nWe provide quasi-maximum likelihood\
      \ estimates of volatility (QMLE) based on moving-average models MA(q), using\
      \ non-zero returns of transaction prices (or mid-quotes if available) sampled\
      \ up to their highest frequency available, for days with at least 12 observations.\
      \ We select the best model (q) using Akaike Information Criterion (AIC). For\
      \ comparison, we report realized volatility (RV) estimates using 5-minute and\
      \ 15-minute subsampled returns.\n\nReferences\n1. “When Moving-Average Models\
      \ Meet High-Frequency Data: Uniform Inference on Volatility”, by Rui Da and\
      \ Dacheng Xiu. 2017.\n2. “Quasi-Maximum Likelihood Estimation of Volatility\
      \ with High Frequency Data”, by Dacheng Xiu. Journal of Econometrics, 159 (2010),\
      \ 235-250.\n3. “How Often to Sample A Continuous-time Process in the Presence\
      \ of Market Microstructure Noise”, by Yacine Aït-Sahalia, Per Mykland, and Lan\
      \ Zhang. Review of Financial Studies, 18 (2005), 351–416.\n4. “The Distribution\
      \ of Exchange Rate Volatility”, by Torben Andersen, Tim Bollerslev, Francis\
      \ X. Diebold, and Paul Labys. Journal of the American Statistical Association,\
      \ 96 (2001), 42-55.\n5. “Econometric Analysis of Realized Volatility and Its\
      \ Use in Estimating Stochastic Volatility Models”, by Ole E Barndorff‐Nielsen\
      \ and Neil Shephard. Journal of the Royal Statistical Society: Series B, 64\
      \ (2002), 253-280."
    domains:
    - dachxiu.chicagobooth.edu
    name: article_rlab_rv
    output_fields: []
    probe:
      check_interval: 2592000
      params:
        symbol: str 股票代码
      skip: false
    rate_limit_key: default
    signature:
    - symbol
    sources: []
