      :param indicator: move_in 迁入 move_out 迁出

      :type indicator: str

      :param date: 查询的日期 20200101 以后的时间

      :type date: str

      :return: 迁入地详情/迁出地详情的前 50 个

      :rtype: pandas.DataFrame'
    domains:
    - huiyan.baidu.com
    - qianxi.baidu.com
    name: migration_area_baidu
    output_fields: []
    probe:
      check_interval: 2592000
      params:
        area: 可以输入 省份 或者 具体城市 但是需要用全称
        date: 查询的日期 20200101 以后的时间
        indicator: move_in 迁入 move_out 迁出
      skip: false
    rate_limit_key: default
    signature:
    - area
    - indicator
    - date
    sources: []
