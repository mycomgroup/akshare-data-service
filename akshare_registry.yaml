  article_oman_rv:
    category: other
    description: 'Oxford-Man Institute of Quantitative Finance Realized Library 的数据

      :param symbol: str [''AEX'', ''AORD'', ''BFX'', ''BSESN'', ''BVLG'', ''BVSP'',
      ''DJI'', ''FCHI'', ''FTMIB'', ''FTSE'', ''GDAXI'', ''GSPTSE'', ''HSI'', ''IBEX'',
      ''IXIC'', ''KS11'', ''KSE'', ''MXX'', ''N225'', ''NSEI'', ''OMXC20'', ''OMXHPI'',
      ''OMXSPI'', ''OSEAX'', ''RUT'', ''SMSI'', ''SPX'', ''SSEC'', ''SSMI'', ''STI'',
      ''STOXX50E'']

      :param index: str 指标 [''medrv'', ''rk_twoscale'', ''bv'', ''rv10'', ''rv5'',
      ''rk_th2'', ''rv10_ss'', ''rsv'', ''rv5_ss'', ''bv_ss'', ''rk_parzen'', ''rsv_ss'']

      :return: pandas.DataFrame


      The Oxford-Man Institute''s "realised library" contains daily non-parametric
      measures of how volatility financial assets or indexes were in the past. Each
      day''s volatility measure depends solely on financial data from that day. They
      are driven by the use of the latest innovations in econometric modelling and
      theory to design them, while we draw our high frequency data from the Thomson
      Reuters DataScope Tick History database. Realised measures are not volatility
      forecasts. However, some researchers use these measures as an input into forecasting
      models. The aim of this line of research is to make financial markets more transparent
      by exposing how volatility changes through time.


      This Library is used as the basis of some of our own research, which effects
      its scope, and is made available here to encourage the more widespread exploitation
      of these methods. It is given ''as is'' and solely for informational purposes,
      please read the disclaimer.


      The volatility data can be visually explored. We make the complete up-to-date
      dataset available for download. Lists of assets covered and realized measures
      available are also available.

      | Symbol    | Name                                      | Earliest Available
      | Latest Available  |

      |-----------|-------------------------------------------|--------------------|-------------------|

